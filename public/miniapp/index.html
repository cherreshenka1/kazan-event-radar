<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Kazan Event Radar</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./config.js"></script>
    <script src="./photo-manifest.js"></script>
    <script src="./event-preview-manifest.js"></script>
  </head>
  <body>
    <main class="app">
      <header class="topbar" aria-label="Быстрые действия">
        <button class="topbar-brand" type="button" data-action="top-tab" data-tab="events">
          <span class="topbar-logo">KER</span>
          <span>
            <strong>Kazan Event Radar</strong>
            <small>афиша и гид по Казани</small>
          </span>
        </button>
        <div class="topbar-actions" id="topbarActions">
          <button class="topbar-button" type="button" data-action="top-tab" data-tab="support">Помощь</button>
          <button class="topbar-button" type="button" data-action="top-collab">Сотрудничество</button>
          <button class="topbar-button" type="button" data-action="top-tab" data-tab="pro">Pro</button>
          <button class="topbar-button" type="button" data-action="theme-toggle" id="themeToggle">Тёмная</button>
        </div>
      </header>

      <section class="hero" id="hero">
        <div class="hero-copy">
          <p class="eyebrow" id="heroEyebrow">Kazan Event Radar</p>
          <h1 id="heroTitle">Казань без лишнего поиска</h1>
          <p class="hero-text" id="heroText">
            Афиша, места, еда, пешие маршруты, активный отдых, мастер-классы, поездки на машине, билеты и напоминания в одном мини-приложении.
          </p>
          <div class="hero-badges" id="heroBadges"></div>
        </div>
      </section>

      <nav class="tabs" aria-label="Разделы">
        <button class="tab is-active" data-tab="events">Афиша</button>
        <button class="tab" data-tab="places">Места</button>
        <button class="tab" data-tab="food">Еда</button>
        <button class="tab" data-tab="routes">Пешие маршруты</button>
        <button class="tab" data-tab="active">Активный отдых</button>
        <button class="tab" data-tab="masterclasses">Мастер-классы</button>
        <button class="tab" data-tab="roadtrip">На машине</button>
      </nav>

      <section id="status" class="status">Загружаю данные...</section>
      <section id="content" class="content"></section>
    </main>

    <script src="./app.js" type="module"></script>
  </body>
</html>
