services:
  - type: web
    name: kazan-event-radar
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: ALLOW_DEV_AUTH
        value: false
      - key: MINI_APP_URL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_MANAGER_USERNAME
        value: cherreshenkaw
      - key: TELEGRAM_CHANNEL_INVITE_URL
        sync: false
      - key: ANALYTICS_USERNAME
        value: admin
      - key: ANALYTICS_PASSWORD
        sync: false
      - key: EVENT_TARGET_MONTH
        value: 2026-04
      - key: POST_APPROVAL_CRON
        value: 0 9 * * *
      - key: DRAFTS_PER_DAY
        value: 10
